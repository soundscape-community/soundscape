name: ios-tests
on:
    push:
        branches:
            - main
        paths:
            - 'apps/ios/**'
            - '.github/workflows/ios-tests.yml'
    pull_request:
        branches:
            - main
        paths:
            - 'apps/ios/**'
    workflow_dispatch:
concurrency:
    group: ${{ github.ref }}
    cancel-in-progress: true
jobs:
    unit-tests:
        runs-on: macos-15
        steps:
            - uses: actions/checkout@v6
            - uses: maxim-lobanov/setup-xcode@v1
              with:
                xcode-version: '26.2'
            - name: setup
              run: |
                xcodebuild -version
                gem install xcpretty
            - name: Run LocalizationLinter
              working-directory: apps/ios
              run: |
                swift Scripts/LocalizationLinter/main.swift
            - name: Build
              run: >
                xcodebuild build-for-testing -workspace apps/ios/GuideDogs.xcworkspace
                -scheme Soundscape -destination "platform=iOS Simulator,OS=26.2,name=iPhone 17 Pro"
                CODE_SIGN_IDENTITY= CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
                | tee xcodebuild.log | xcpretty && exit ${PIPESTATUS[0]}
            - name: uploadlog
              uses: actions/upload-artifact@v7
              with:
                name: xcodebuild-log
                path: xcodebuild.log
            - name: Test
              run: >
                xcodebuild test-without-building -workspace apps/ios/GuideDogs.xcworkspace
                -scheme Soundscape -destination "platform=iOS Simulator,OS=26.2,name=iPhone 17 Pro"
